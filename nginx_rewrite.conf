# OpenResty/Nginx 伪静态规则配置
# 请将此文件内容添加到你的站点配置中

# 在 server {} 块中添加以下规则：

location / {
    # 如果请求的文件或目录不存在
    if (!-e $request_filename) {
        # 伪静态：tag/id.html -> /index.php?tag=tag&id=id
        rewrite ^/([^/]+)/(\d+)\.html$ /index.php?tag=$1&id=$2 last;
        
        # 其他所有请求交给 index.php
        rewrite ^(.*)$ /index.php last;
    }
}

# 允许访问 API 目录
location /kernel/ {
    # API 请求
}

# 禁止访问敏感文件
location ~ /\. {
    deny all;
}
